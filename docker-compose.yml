services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: market
      POSTGRES_USER: market
      POSTGRES_PASSWORD: market
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U market -d market"]
      interval: 2s
      timeout: 2s
      retries: 30
    volumes:
      - market-db:/var/lib/postgresql/data

  app:
    build: .
    restart: always
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/market
      SPRING_DATASOURCE_USERNAME: market
      SPRING_DATASOURCE_PASSWORD: market
    depends_on:
      postgres:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - app
    ports:
      - "${MARKET_PORT:-8080}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  market-db:
